name: Terraform Validation

on:
  push:
    branches:
      - main

jobs:
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Set Github URL
        run: git config --global url."https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com".insteadOf https://github.com
          
      - name: Find directories with .tf files
        id: find-dirs
        run: |
          # Find directories containing .tf files and store them in a variable
          find ./ -type f -name '*.tf' -exec dirname {} \; | sort -u
          dirs=$(find ./ -type f -name '*.tf' -exec dirname {} \; | sort -u)
          {
            echo 'directories<<EOF'
            echo $dirs
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Run terraform validate on each directory
        run: |
          for dir in $directories; do
            echo "Running terraform validate in $dir"
            cd $dir
            terraform init -backend=false
            if ! terraform validate; then
              echo "Terraform validation failed in directory: $dir"
              validation_failed=1
            fi
            cd -
          done
        
          if [[ $validation_failed -eq 1 ]]; then
            echo "One or more Terraform validations failed."
            exit 1
          fi

      - name: Report Formatting Issues
        if: failure()
        run: echo "Terraform validation issues detected."
