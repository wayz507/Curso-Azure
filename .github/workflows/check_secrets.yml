name: 'Check Required Secrets'

on:
  workflow_dispatch:

jobs:
  secrets-check:
    name: Check Azure secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify Azure secrets are set
        run: |
          missing=0
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then echo "AZURE_CLIENT_ID missing"; missing=1; fi
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then echo "AZURE_CLIENT_SECRET missing"; missing=1; fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then echo "AZURE_TENANT_ID missing"; missing=1; fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then echo "AZURE_SUBSCRIPTION_ID missing"; missing=1; fi
          if [ $missing -eq 1 ]; then exit 1; fi
          echo "All required Azure secrets are present."
